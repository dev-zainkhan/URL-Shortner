name: Deploy to EC2

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::594486941035:role/git-deploy
          aws-region: us-east-1

      - name: Deploy to EC2 Instances
        run: |
          aws ssm send-command \
            --instance-ids i-0d2eb1afe2072b5bc i-07b5ca4e62a012355 \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Deployment" \
            --parameters 'commands=[
              "sudo -iu ec2-user bash -c '\''cd ~/URL-shortner && git pull origin main && npm ci && pm2 restart server && pm2 save'\''"
            ]'
